{% extends "base.html" %}
{% block title %}Crear cuenta — Soporte TI{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-title">Crear cuenta</h1>
    <p class="auth-subtitle">Completa el formulario para registrarte</p>

    <form method="POST" action="{{ url_for('registro') }}" class="form">
      <div class="field">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" required autocomplete="name" />
      </div>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Contraseña <span class="hint">(mínimo 6 caracteres)</span></label>
        <input type="password" id="password" name="password" required autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="confirmar">Confirmar contraseña</label>
        <input type="password" id="confirmar" name="confirmar" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn--primary btn--full">Crear cuenta</button>
    </form>

    <p class="auth-footer">
      ¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a>
    </p>
  </div>
</div>
{% endblock %}
